<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="32" fill="#e2e8f0" font-size="16" font-weight="700">chat-daily-tg 架构</text>

  <!-- Data Sources -->
  <rect x="30" y="60" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="30" y="60" width="160" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="110" y="82" fill="white" font-size="11" font-weight="600" text-anchor="middle">微信群聊</text>
  <text x="110" y="98" fill="#94a3b8" font-size="9" text-anchor="middle">本地 XML / DB</text>

  <rect x="220" y="60" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="220" y="60" width="160" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="300" y="82" fill="white" font-size="11" font-weight="600" text-anchor="middle">Telegram 群聊</text>
  <text x="300" y="98" fill="#94a3b8" font-size="9" text-anchor="middle">tg-cli SQLite</text>

  <!-- Exporters -->
  <rect x="30" y="160" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="30" y="160" width="160" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="110" y="182" fill="white" font-size="11" font-weight="600" text-anchor="middle">wx_exporter.py</text>
  <text x="110" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">微信消息解析</text>

  <rect x="220" y="160" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="220" y="160" width="160" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="300" y="182" fill="white" font-size="11" font-weight="600" text-anchor="middle">telegram_exporter.py</text>
  <text x="300" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">TG 消息解析</text>

  <!-- Source → Exporter arrows -->
  <path d="M 110,115 L 110,160" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <path d="M 300,115 L 300,160" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- context_builder -->
  <rect x="100" y="255" width="220" height="55" rx="6" fill="#0f172a"/>
  <rect x="100" y="255" width="220" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="210" y="277" fill="white" font-size="11" font-weight="600" text-anchor="middle">context_builder.py</text>
  <text x="210" y="293" fill="#94a3b8" font-size="9" text-anchor="middle">上下文拼装 + 重复话题降权</text>

  <path d="M 110,210 L 160,255" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <path d="M 300,210 L 260,255" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- run_daily.py orchestrator -->
  <rect x="420" y="140" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="420" y="140" width="160" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="500" y="162" fill="white" font-size="11" font-weight="600" text-anchor="middle">run_daily.py</text>
  <text x="500" y="178" fill="#94a3b8" font-size="9" text-anchor="middle">主入口 (crontab 每日)</text>

  <!-- orchestrator → context_builder -->
  <path d="M 420,175 L 320,270" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>

  <!-- summarizer -->
  <rect x="420" y="260" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="420" y="260" width="160" height="55" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="500" y="282" fill="white" font-size="11" font-weight="600" text-anchor="middle">summarizer.py</text>
  <text x="500" y="298" fill="#94a3b8" font-size="9" text-anchor="middle">DeepSeek LLM 摘要</text>

  <path d="M 210,310 L 420,285" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- vision.py (optional) -->
  <rect x="420" y="350" width="160" height="45" rx="6" fill="#0f172a"/>
  <rect x="420" y="350" width="160" height="45" rx="6" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="500" y="370" fill="white" font-size="11" font-weight="600" text-anchor="middle">vision.py</text>
  <text x="500" y="386" fill="#94a3b8" font-size="9" text-anchor="middle">图片理解 (可选)</text>

  <!-- summarizer → vision (optional) -->
  <path d="M 500,315 L 500,350" fill="none" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrow-violet)" stroke-dasharray="4,3"/>

  <!-- Output: Telegram Bot -->
  <rect x="680" y="200" width="160" height="55" rx="25" fill="#0f172a"/>
  <rect x="680" y="200" width="160" height="55" rx="25" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="760" y="222" fill="white" font-size="11" font-weight="600" text-anchor="middle">Telegram Bot</text>
  <text x="760" y="238" fill="#94a3b8" font-size="9" text-anchor="middle">推送日报到指定 chat</text>

  <path d="M 580,287 L 680,230" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output: Local Archive -->
  <rect x="680" y="310" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="680" y="310" width="160" height="55" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="760" y="332" fill="white" font-size="11" font-weight="600" text-anchor="middle">~/chat-daily/</text>
  <text x="760" y="348" fill="#94a3b8" font-size="9" text-anchor="middle">本地归档 (JSON + MD)</text>

  <path d="M 580,295 L 680,335" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- hot-leads -->
  <rect x="680" y="400" width="160" height="45" rx="6" fill="#0f172a"/>
  <rect x="680" y="400" width="160" height="45" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="760" y="420" fill="white" font-size="11" font-weight="600" text-anchor="middle">hot-leads/</text>
  <text x="760" y="436" fill="#94a3b8" font-size="9" text-anchor="middle">短期热点 (14 天)</text>

  <path d="M 580,300 L 680,415" fill="none" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3" stroke-opacity="0.6"/>

  <!-- Legend -->
  <rect x="30" y="490" width="350" height="35" rx="6" fill="none" stroke="#1e293b" stroke-width="1"/>
  <rect x="45" y="502" width="12" height="12" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="62" y="512" fill="#94a3b8" font-size="8">数据源 / 入口</text>
  <rect x="135" y="502" width="12" height="12" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="152" y="512" fill="#94a3b8" font-size="8">导出器</text>
  <rect x="200" y="502" width="12" height="12" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="217" y="512" fill="#94a3b8" font-size="8">LLM / 存储</text>
  <rect x="280" y="502" width="12" height="12" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="297" y="512" fill="#94a3b8" font-size="8">处理</text>
</svg>
