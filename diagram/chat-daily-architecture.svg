<svg xmlns="http://www.w3.org/2000/svg" width="940" height="660" viewBox="0 0 940 660">
  <style>
    text { font-family: 'SF Mono', 'Menlo', 'JetBrains Mono', 'PingFang SC', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="38" fill="#e2e8f0" font-size="16" font-weight="700">chat-daily-tg 架构</text>

  <!-- Orchestrator banner -->
  <rect x="330" y="16" width="320" height="36" rx="6" fill="rgba(30,41,59,0.7)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="490" y="39" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">run_daily.py · launchd 每日 08:00 总调度</text>
  <path d="M 490,52 L 490,196" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <!-- Sources -->
  <rect x="30" y="80" width="180" height="52" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="120" y="102" fill="white" font-size="11" font-weight="600" text-anchor="middle">微信群聊</text>
  <text x="120" y="118" fill="#94a3b8" font-size="9" text-anchor="middle">wx-cli 解密本地消息库</text>

  <rect x="240" y="80" width="180" height="52" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="330" y="102" fill="white" font-size="11" font-weight="600" text-anchor="middle">Telegram 群聊</text>
  <text x="330" y="118" fill="#94a3b8" font-size="9" text-anchor="middle">tg-cli sync → SQLite</text>

  <!-- vision (optional) -->
  <rect x="640" y="80" width="230" height="52" rx="6" fill="rgba(46,16,101,0.35)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="755" y="102" fill="white" font-size="11" font-weight="600" text-anchor="middle">vision.py 图片理解（可选）</text>
  <text x="755" y="118" fill="#94a3b8" font-size="9" text-anchor="middle">多模态分析高价值图片</text>

  <!-- Row A: export / preprocess / context -->
  <rect x="30" y="200" width="390" height="56" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="225" y="222" fill="white" font-size="10.5" font-weight="600" text-anchor="middle">wx_exporter.py · telegram_exporter.py</text>
  <text x="225" y="240" fill="#94a3b8" font-size="9" text-anchor="middle">导出 · 清洗 · 低信息过滤 · 媒体候选</text>

  <rect x="460" y="200" width="180" height="56" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="550" y="222" fill="white" font-size="11" font-weight="600" text-anchor="middle">预处理</text>
  <text x="550" y="240" fill="#94a3b8" font-size="9" text-anchor="middle">跨群聚类 · LLM 脱敏</text>

  <rect x="680" y="200" width="190" height="56" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="775" y="222" fill="white" font-size="11" font-weight="600" text-anchor="middle">context_builder.py</text>
  <text x="775" y="240" fill="#94a3b8" font-size="9" text-anchor="middle">永久库 · 热点 · 重复降权回流</text>

  <!-- Row B: summarize / evidence / verify / post -->
  <rect x="680" y="350" width="190" height="56" rx="6" fill="rgba(46,16,101,0.45)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="775" y="372" fill="white" font-size="11" font-weight="600" text-anchor="middle">summarizer.py 初稿</text>
  <text x="775" y="390" fill="#94a3b8" font-size="9" text-anchor="middle">DeepSeek / OpenAI 兼容 LLM</text>

  <rect x="460" y="350" width="180" height="56" rx="6" fill="rgba(46,16,101,0.35)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="550" y="372" fill="white" font-size="11" font-weight="600" text-anchor="middle">embedding 证据（可选）</text>
  <text x="550" y="390" fill="#94a3b8" font-size="9" text-anchor="middle">Gemini · evidence.sqlite</text>

  <rect x="240" y="350" width="180" height="56" rx="6" fill="rgba(46,16,101,0.45)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="330" y="372" fill="white" font-size="11" font-weight="600" text-anchor="middle">verifier 二次核验</text>
  <text x="330" y="390" fill="#94a3b8" font-size="9" text-anchor="middle">实体 / 主语 / 金额修正</text>

  <rect x="30" y="350" width="180" height="56" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="120" y="372" fill="white" font-size="11" font-weight="600" text-anchor="middle">post_process.py</text>
  <text x="120" y="390" fill="#94a3b8" font-size="9" text-anchor="middle">来源缩写 · MD→HTML</text>

  <!-- Row C: outputs -->
  <rect x="30" y="480" width="200" height="64" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="503" fill="white" font-size="11" font-weight="600" text-anchor="middle">tg_sender.py → Bot API</text>
  <text x="130" y="520" fill="#94a3b8" font-size="9" text-anchor="middle">PNG 卡片（可选）+ 文本分块</text>
  <text x="130" y="534" fill="#94a3b8" font-size="9" text-anchor="middle">推送日报到指定 chat</text>

  <rect x="270" y="480" width="210" height="64" rx="6" fill="rgba(46,16,101,0.45)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="375" y="503" fill="white" font-size="11" font-weight="600" text-anchor="middle">~/chat-daily/archive/</text>
  <text x="375" y="520" fill="#94a3b8" font-size="9" text-anchor="middle">原始导出 · summary · concise</text>
  <text x="375" y="534" fill="#94a3b8" font-size="9" text-anchor="middle">verification · evidence</text>

  <rect x="520" y="480" width="230" height="64" rx="6" fill="rgba(46,16,101,0.45)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="635" y="503" fill="white" font-size="11" font-weight="600" text-anchor="middle">机会库</text>
  <text x="635" y="520" fill="#94a3b8" font-size="9" text-anchor="middle">permanent · hot-leads(14天)</text>
  <text x="635" y="534" fill="#94a3b8" font-size="9" text-anchor="middle">repeat_topics(7天) → 次日回流</text>

  <!-- Arrows: sources → exporters -->
  <path d="M 120,132 L 120,196" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <path d="M 330,132 L 330,196" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- exporters → preprocess → context -->
  <path d="M 420,228 L 456,228" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <path d="M 640,228 L 676,228" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- exporters → vision (optional) → summarizer -->
  <path d="M 390,200 L 390,166 L 755,166 L 755,136" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-violet)"/>
  <path d="M 870,106 L 905,106 L 905,378 L 874,378" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-violet)"/>

  <!-- context → summarizer → evidence → verifier → post -->
  <path d="M 775,256 L 775,346" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <path d="M 680,378 L 644,378" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <path d="M 460,378 L 424,378" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <path d="M 240,378 L 214,378" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- post → push; verifier → archive / opportunities -->
  <path d="M 120,406 L 120,476" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <path d="M 330,406 L 330,476" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <path d="M 390,406 L 390,445 L 610,445 L 610,476" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- Legend -->
  <rect x="30" y="590" width="880" height="44" rx="6" fill="rgba(30,41,59,0.5)"/>
  <rect x="48" y="604" width="12" height="12" rx="2" fill="rgba(8,51,68,0.9)" stroke="#22d3ee"/>
  <text x="68" y="614" fill="#94a3b8" font-size="9">数据源 / 推送</text>
  <rect x="160" y="604" width="12" height="12" rx="2" fill="rgba(6,78,59,0.9)" stroke="#34d399"/>
  <text x="180" y="614" fill="#94a3b8" font-size="9">导出层</text>
  <rect x="248" y="604" width="12" height="12" rx="2" fill="rgba(120,53,15,0.8)" stroke="#fbbf24"/>
  <text x="268" y="614" fill="#94a3b8" font-size="9">处理</text>
  <rect x="320" y="604" width="12" height="12" rx="2" fill="rgba(46,16,101,0.9)" stroke="#a78bfa"/>
  <text x="340" y="614" fill="#94a3b8" font-size="9">LLM / 存储</text>
  <rect x="430" y="604" width="12" height="12" rx="2" fill="none" stroke="#a78bfa" stroke-dasharray="4,3"/>
  <text x="450" y="614" fill="#94a3b8" font-size="9">虚线框 = 可选模块（vision / embedding 证据 / PNG 卡片）</text>
  <text x="68" y="628" fill="#64748b" font-size="8">流程：导出 → 预处理 → 上下文 → 初稿 → 证据检索 → 二次核验 → 后处理 → 推送；归档与机会库随核验落盘，次日回流进上下文</text>
</svg>
